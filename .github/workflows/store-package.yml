name: Store package

# Microsoft Store 提出用の署名なし .msixbundle を公式 SDK でビルドする（手動実行）。
# 公式 SDK 環境ではトリミングが効くため、ローカル(scoop 等)より小さいパッケージになる。
# 予約済み Store Identity はリポジトリに焼き込まず、リポジトリ変数から注入する:
#   Settings → Secrets and variables → Actions → Variables:
#     STORE_IDENTITY_NAME          例: 12345Publisher.RedmineForCommandPalette
#     STORE_PUBLISHER              例: CN=ABCD1234-....
#     STORE_PUBLISHER_DISPLAY_NAME Partner Center の「発行者の表示名」と完全一致が必須
# 変数が未設定ならマニフェスト既定のまま（テスト用パッケージ）でビルドする。

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (x.y.z)'
        required: true
        default: '1.0.3'
      no_trim:
        description: 'Disable trimming (larger package; only if the trimmed build fails)'
        type: boolean
        default: false

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build MSIX bundle
        run: |
          $params = @{
            Version              = '${{ inputs.version }}'
            IdentityName         = '${{ vars.STORE_IDENTITY_NAME }}'
            Publisher            = '${{ vars.STORE_PUBLISHER }}'
            PublisherDisplayName = '${{ vars.STORE_PUBLISHER_DISPLAY_NAME }}'
          }
          if ('${{ inputs.no_trim }}' -eq 'true') { $params.NoTrim = $true }

          # Store 提出用に Identity を注入するなら、表示名も必須（空だと Partner Center の
          # PublisherDisplayName 検証で落ちる。設定漏れをここで早期に検知する）。
          if ($params.IdentityName -and -not $params.PublisherDisplayName) {
            Write-Error "STORE_PUBLISHER_DISPLAY_NAME variable is not set. Set it (Actions Variables) to your Partner Center publisher display name."
          }

          .\build-msix.ps1 @params

      - name: Upload bundle
        uses: actions/upload-artifact@v5
        with:
          name: store-msixbundle-${{ inputs.version }}
          path: |
            MsixPackages/*.msixbundle
            MsixPackages/*.msix
          if-no-files-found: error
