name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Debug ビルドはトリム/AOT/single-file アナライザーを有効化しており、
      # 警告 1 件でも失敗する（リポジトリのハードルール）。
      - name: Build (Debug, analyzers as errors)
        run: dotnet build RedmineExtension.sln -c Debug -p:Platform=${{ matrix.platform }} -warnaserror
